[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agent-adapters"
version = "0.1.0"
description = "Pluggable agent adapters — mock, patch-only, and CLI agent support"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "ruff>=0.6.0",
]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]

[dependency-groups]
dev = [
    "pytest-asyncio>=1.4.0",
]
