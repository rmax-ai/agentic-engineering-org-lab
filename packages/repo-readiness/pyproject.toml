[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "repo-readiness"
version = "0.1.0"
description = "Repo Readiness Scanner — scores repositories for agent compatibility (0-100)"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0.0",
    "world-model",
]

[tool.uv.sources]
world-model = { path = "../world-model", editable = true }

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "ruff>=0.6.0",
]

[project.scripts]
repo-readiness = "repo_readiness.cli:main"

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
