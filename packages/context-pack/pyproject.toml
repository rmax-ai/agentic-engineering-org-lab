[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "context-pack"
version = "0.1.0"
description = "Context Pack Builder — assembles bounded, structured context for coding agents"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0.0",
    "task-intake",
    "world-model",
]

[tool.uv.sources]
task-intake = { path = "../task-intake", editable = true }
world-model = { path = "../world-model", editable = true }

[project.optional-dependencies]
dev = ["pytest>=8.0.0", "ruff>=0.6.0"]
