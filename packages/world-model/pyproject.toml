[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "world-model"
version = "0.1.0"
description = "Toy org topology builder — parses service.yaml into a machine-readable dependency graph"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "ruff>=0.6.0",
]

[project.scripts]
world-model = "world_model.cli:main"

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
