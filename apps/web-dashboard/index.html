<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic Engineering Org Lab — Control Plane</title>
<style>
:root {
  --surface: #0d1117;
  --panel: #161b22;
  --border: #30363d;
  --muted: #8b949e;
  --neutral: #6e7681;
  --text: #c9d1d9;
  --white: #f0f6fc;
  --success: #2ea043;
  --failure: #cf222e;
  --active: #388bfd;
  --agent: #8957e5;
  --blocked: #d29922;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'SF Mono',Fira Code,monospace;background:var(--surface);color:var(--text);font-size:13px;line-height:1.5;overflow:hidden}
#app{display:flex;height:100vh}

/* Sidebar */
#sidebar{width:48px;display:flex;flex-direction:column;align-items:center;padding:12px 0;border-right:1px solid var(--border);background:var(--surface);flex-shrink:0}
#sidebar .logo{color:var(--agent);font-size:13px;font-weight:700;margin-bottom:20px}
#sidebar nav{display:flex;flex-direction:column;gap:4px;flex:1}
#sidebar nav a{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:14px;color:var(--neutral);text-decoration:none;transition:all 0.15s}
#sidebar nav a:hover{color:var(--text);background:var(--panel)}
#sidebar nav a.active{color:var(--active);background:var(--panel);border:1px solid var(--border)}
#sidebar .version{margin-top:auto;font-size:10px;color:var(--neutral)}

/* Task List */
#task-list{width:280px;border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;background:var(--surface)}
#task-list h2{padding:12px 16px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid var(--border);font-weight:600}
.task-item{display:block;width:100%;text-align:left;padding:12px 16px;border:none;border-left:2px solid transparent;border-bottom:1px solid rgba(48,54,61,.5);background:transparent;color:var(--text);cursor:pointer;transition:background 0.15s}
.task-item:hover{background:rgba(22,27,34,.5)}
.task-item.active{background:var(--panel);border-left-color:var(--active)}
.task-item .id{font-size:11px;color:var(--neutral);font-family:monospace}
.task-item .title{font-size:13px;color:var(--text);margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.task-item .meta{font-size:10px;color:var(--muted);margin-top:4px;display:flex;gap:8px}

/* Main Content */
#main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.header{padding:16px 24px;border-bottom:1px solid var(--border);background:rgba(22,27,34,.5)}
.header h1{font-size:18px;color:var(--white);font-weight:600}
.header .desc{font-size:13px;color:var(--muted);margin-top:4px}
.header .info{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px;font-size:11px}
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 24px;background:var(--surface);flex-shrink:0}
.tab{padding:8px 14px;font-size:12px;color:var(--muted);cursor:pointer;border:none;border-bottom:2px solid transparent;background:transparent;transition:all 0.15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--active);border-bottom-color:var(--active)}
.content{flex:1;padding:24px;overflow-y:auto}

/* Status Pills */
.pill{display:inline-flex;align-items:center;gap:4px;padding:1px 8px;border-radius:9999px;font-size:10px;font-weight:500;border:1px solid;white-space:nowrap}
.pill::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor}
.pill.pending{color:var(--neutral);border-color:rgba(110,118,129,.3);background:rgba(110,118,129,.1)}
.pill.completed,.pill.pass{color:var(--success);border-color:rgba(46,160,67,.3);background:rgba(46,160,67,.1)}
.pill.failed,.pill.fail{color:var(--failure);border-color:rgba(207,34,46,.3);background:rgba(207,34,46,.1)}
.pill.running,.pill.classifying,.pill.verifying,.pill.reviewing{color:var(--active);border-color:rgba(56,139,253,.3);background:rgba(56,139,253,.1)}
.pill.info{color:var(--active);border-color:rgba(56,139,253,.3);background:rgba(56,139,253,.1)}

/* Cards */
.card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px}
.card-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;font-weight:600;margin-bottom:8px}
.section{border-bottom:1px solid var(--border);padding-bottom:16px;margin-bottom:16px}
.section-title{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;font-weight:600;margin-bottom:8px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}

/* Pipeline */
.pipeline{display:flex;align-items:flex-start;gap:0;overflow-x:auto;padding:16px 0}
.pipe-node{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0}
.pipe-dot{width:40px;height:40px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700}
.pipe-dot.pass{border-color:var(--success);color:var(--success);background:rgba(46,160,67,.1)}
.pipe-dot.fail{border-color:var(--failure);color:var(--failure);background:rgba(207,34,46,.1)}
.pipe-dot.active{border-color:var(--active);color:var(--active);background:rgba(56,139,253,.1);animation:pulse 2s infinite}
.pipe-dot.pending{border-color:var(--neutral);color:var(--neutral);background:rgba(110,118,129,.1)}
.pipe-dot.skipped{border-color:rgba(110,118,129,.3);color:rgba(110,118,129,.5);background:rgba(110,118,129,.05)}
.pipe-label{font-size:9px;color:var(--muted);white-space:nowrap}
.pipe-time{font-size:8px;color:rgba(110,118,129,.7)}
.pipe-conn{width:32px;height:2px;margin-top:-24px;flex-shrink:0}
.pipe-conn.pass{background:rgba(46,160,67,.5)}
.pipe-conn.fail{background:rgba(207,34,46,.5)}
.pipe-conn.pending{background:rgba(110,118,129,.3)}

@keyframes pulse{0%,100%{box-shadow:0 0 4px rgba(56,139,253,.3)}50%{box-shadow:0 0 12px rgba(56,139,253,.5)}}

/* Diff Viewer */
.diff-viewer{background:#000;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.diff-header{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--panel);gap:8px}
.diff-header span{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;font-weight:600}
.diff-content{padding:12px;font-size:12px;line-height:1.6;overflow-x:auto;max-height:400px;overflow-y:auto;white-space:pre;font-family:'SF Mono',Fira Code,monospace}
.diff-add{background:rgba(46,160,67,.15);color:#7ee787;display:block}
.diff-remove{background:rgba(207,34,46,.15);color:#ff7b72;display:block}
.diff-hunk{color:var(--muted)}

/* Timeline */
.timeline-item{display:flex;gap:12px;padding:8px 12px;transition:background 0.15s}
.timeline-item:hover{background:rgba(22,27,34,.5)}
.tl-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:2px}
.tl-dot.pass{background:rgba(46,160,67,.2);color:var(--success)}
.tl-dot.fail{background:rgba(207,34,46,.2);color:var(--failure)}
.tl-dot.info{background:rgba(56,139,253,.2);color:var(--active)}
.tl-body{flex:1;min-width:0;padding-bottom:8px;border-left:1px solid rgba(48,54,61,.3)}
.tl-meta{display:flex;gap:8px;flex-wrap:wrap;margin-left:12px}
.tl-time{font-size:9px;color:var(--neutral);font-family:monospace}
.tl-type{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em}
.tl-msg{font-size:12px;color:var(--text);margin-top:2px;margin-left:12px}
.tl-item:last-child .tl-body{border-left-color:transparent}

/* World Model */
.wm-grid{display:flex;flex-wrap:wrap;gap:24px;justify-content:center;padding:16px}
.wm-node{background:var(--panel);border:2px solid;padding:14px 18px;min-width:150px;text-align:center;border-radius:8px}
.wm-node.risk-low{border-color:rgba(46,160,67,.4)}
.wm-node.risk-medium{border-color:rgba(210,153,34,.4)}
.wm-node.risk-high{border-color:rgba(207,34,46,.4)}
.wm-node.risk-low{border-radius:8px}
.wm-name{font-size:13px;color:var(--white);font-weight:600}
.wm-type{font-size:9px;color:var(--muted);text-transform:uppercase;margin-top:2px}
.wm-meta{font-size:9px;color:var(--neutral);margin-top:4px}
.wm-score{display:inline-block;font-size:9px;padding:1px 6px;border-radius:4px;margin-top:4px}
.wm-score.ok{background:rgba(46,160,67,.2);color:var(--success)}
.wm-score.warn{background:rgba(210,153,34,.2);color:var(--blocked)}
.wm-deps{font-size:9px;color:var(--neutral);margin-top:6px}

/* Review */
.review-item{display:flex;gap:10px;padding:8px 12px;background:var(--panel);border:1px solid var(--border);border-radius:6px;margin-bottom:6px}
.sev{font-size:9px;text-transform:uppercase;padding:2px 6px;border-radius:4px;border:1px solid;flex-shrink:0;font-family:monospace}
.sev.low{color:var(--neutral);border-color:rgba(110,118,129,.3)}
.sev.medium{color:var(--blocked);border-color:rgba(210,153,34,.3)}
.sev.high,.sev.blocker{color:var(--failure);border-color:rgba(207,34,46,.3)}
.rev-cat{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em}
.rev-msg{font-size:12px;color:var(--text);margin-top:2px}

/* Verif row */
.vrow{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--panel);border:1px solid var(--border);border-radius:6px;margin-bottom:4px}
.vrow-left{display:flex;align-items:center;gap:10px}
.vrow-right{display:flex;align-items:center;gap:10px;font-size:11px}

/* Rec bar */
.rec{display:flex;align-items:center;gap:12px}
.rec-icon{width:40px;height:40px;border-radius:50%;border:2px solid var(--success);display:flex;align-items:center;justify-content:center;color:var(--success);font-size:18px;font-weight:700;background:rgba(46,160,67,.1);flex-shrink:0}
.rec-text{color:var(--success);font-size:13px;font-weight:600}
.rec-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* Progress bar */
.progress-bar{flex:1;height:8px;background:var(--panel);border-radius:9999px;overflow:hidden}
.progress-fill{height:100%;background:var(--success);border-radius:9999px;transition:width 0.5s}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Tags */
.tag{font-size:9px;padding:1px 6px;border-radius:4px;border:1px solid var(--border);color:var(--muted);font-family:monospace;white-space:nowrap}
.tag.agent{border-color:rgba(137,87,229,.3);color:var(--agent)}

.hidden{display:none!important}
.text-success{color:var(--success)}
.text-failure{color:var(--failure)}
.text-blocked{color:var(--blocked)}
.text-agent{color:var(--agent)}
.text-active{color:var(--active)}
.font-bold{font-weight:700}
details summary{cursor:pointer;user-select:none}
</style>
</head>

  {id:"evt_002",type:"task.classified",time:"09:00:03.150",actor:"system",msg:"Classification: auto_delegate (0.82). Intent: feature_change.",status:"pass"},

  {id:"evt_007",type:"agent.completed",time:"09:03:45.300",actor:"agent",msg:"Agent completed. 3 files modified, 0 errors.",status:"pass"},
  {id:"evt_008",type:"verification.completed",time:"09:04:10.500",actor:"system",msg:"Verification: 3/3 passed (tests ✓, lint ✓, typecheck ✓)",status:"pass"},
  {id:"evt_009",type:"review.completed",time:"09:04:22.100",actor:"system",msg:"AI review: 0 blocking, 1 suggestion (edge case)",status:"pass"},
  {id:"evt_010",type:"final_report.created",time:"09:04:23.050",actor:"system",msg:"Recommendation: ready for human review.",status:"pass"}

const VERIF_CHECKS = [
  {name:"Unit Tests",status:"pass",summary:"12/12 passed",dur:"8.2s"},
  {name:"Lint (ruff)",status:"pass",summary:"0 errors, 0 warnings",dur:"2.1s"},

];

  {sev:"low",cat:"style",msg:"Consider extracting regex to shared validation constants."}
];

const WM = [
  {name:"signup-api",type:"service",lang:"typescript",owner:"team-growth",risk:"medium",score:82,deps:["validation"]},
  {name:"billing-api",type:"service",lang:"typescript",owner:"team-payments",risk:"high",score:74,deps:["validation"]},
  {name:"notification-worker",type:"worker",lang:"python",owner:"team-platform",risk:"low",score:91,deps:["signup-api","billing-api"]},
  {name:"validation",type:"library",lang:"python",owner:"team-platform",risk:"medium",score:88,deps:[]}
];

const DECISIONS = {
  auto_delegate:"Auto-Delegate",
  human_decompose_first:"Decompose First",
  human_review_required:"Review Required",
  reject_unsafe:"Rejected (Unsafe)",
  insufficient_context:"Insufficient Context"
};

const TABS = ["Overview","Pipeline","Diff","Trace","World"];
let selectedId = "task_001";
let activeTab = "Overview";

function pill(s,l){return`<span class="pill ${s}">${l||s}</span>`}
function diffLine(l){
  if(l.startsWith('+')) return `<span class="diff-add">${esc(l)}</span>`;
  if(l.startsWith('-')) return `<span class="diff-remove">${esc(l)}</span>`;
  if(l.startsWith('@@')) return `<span class="diff-hunk">${esc(l)}</span>`;
  return esc(l);
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function renderTaskList(){
  const el=document.getElementById('task-list');
  el.innerHTML=`<h2>Tasks</h2>`+TASKS.map(t=>`
    <button class="task-item${t.id===selectedId?' active':''}" data-id="${t.id}">
      <div class="id">${t.id} ${pill(t.status)}</div>
      <div class="title">${esc(t.title)}</div>
      <div class="meta"><span>${t.requester}</span><span style="color:var(--blocked)">${t.priority}</span></div>
    </button>`).join('');
  el.querySelectorAll('.task-item').forEach(btn=>btn.onclick=()=>{selectedId=btn.dataset.id;renderAll();});
}

function renderTabs(){
  document.getElementById('tabs').innerHTML=TABS.map(t=>
    `<button class="tab${t===activeTab?' active':''}" data-tab="${t}">${t}</button>`
  ).join('');
  document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{activeTab=b.dataset.tab;renderAll();});
}

function renderHeader(){
  const t=TASKS.find(x=>x.id===selectedId);
  if(!t)return;
  document.getElementById('header').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <span style="font-size:11px;color:var(--neutral);font-family:monospace">${t.id}</span>
          ${pill(t.status)}${t.decision?`<span class="tag agent">${DECISIONS[t.decision]||t.decision}</span>`:''}
        </div>
        <h1>${esc(t.title)}</h1>
        <div class="desc">${esc(t.desc)}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;font-size:11px;flex-shrink:0">
        <span style="color:var(--muted)">Created ${t.created}</span>
        <span style="color:var(--muted)">Risk: <span style="color:var(--blocked);font-weight:600">${t.risk}</span></span>
        <div style="display:flex;gap:4px;margin-top:4px">${t.services.map(s=>`<span class="tag">${s}</span>`).join('')}</div>
      </div>
    </div>`;
}

function overview(){
  return `
    <div class="section">
      <div class="section-title">Repo Readiness</div>
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:24px;font-weight:700;color:var(--success)">82</span>
        <span style="font-size:12px;color:var(--muted)">/ 100</span>
        <div class="progress-bar"><div class="progress-fill" style="width:82%"></div></div>
        <span style="font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(210,153,34,.15);color:var(--blocked);border:1px solid rgba(210,153,34,.3);font-family:monospace">ready_with_caution</span>
      </div>
      <div style="font-size:10px;color:var(--muted);margin-top:8px">Missing: No threat model found · No explicit rollback notes</div>
    </div>

    <div class="section">
      <div class="section-title">Merge Recommendation</div>
      <div class="rec">
        <div class="rec-icon">▲</div>
        <div><div class="rec-text">Ready for Human Review</div><div class="rec-sub">All checks passed. 0 blocking findings. 1 low-severity suggestion.</div></div>
      </div>
    </div>

    <div class="grid3">
      <div class="card">
        <div class="card-title">Classification</div>
        <div style="font-size:13px;font-weight:600;color:var(--agent)">auto_delegate</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px">Confidence: 0.82</div>
      </div>
      <div class="card">
        <div class="card-title">Verification</div>
        <div style="font-size:13px;font-weight:600;color:var(--success)">5/5 Passed</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px">Tests · Lint · TypeCheck · Policy · Boundaries</div>
      </div>
      <div class="card">
        <div class="card-title">Agent Execution</div>
        <div style="font-size:13px;font-weight:600;color:var(--active)">1 attempt</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px">3 files · 0 errors · 3m 40s</div>
      </div>
    </div>
  `;
}

function pipelineHTML(){
  return `<div class="pipeline">`+PIPELINE.map((s,i)=>`
    <div class="pipe-node">
      <div class="pipe-dot ${s.status}">${s.icon}</div>
      <div class="pipe-label">${s.label}</div>
      ${s.time?`<div class="pipe-time">${s.time}</div>`:''}
      ${s.dur?`<div class="pipe-time">${s.dur}</div>`:''}
    </div>
    ${i<PIPELINE.length-1?`<div class="pipe-conn ${PIPELINE[i+1].status}"></div>`:''}
  `).join('')+`</div>`;
}

function diffHTML(){
  return `<div class="diff-viewer">
    <div class="diff-header"><span>Unified Diff</span><span style="margin-left:auto;color:var(--neutral);font-size:9px">3 files changed</span></div>
    <div class="diff-content">${DIFF.split('\n').map(diffLine).join('\n')}</div>
  </div>`;
}

function traceHTML(){
  return TRACE.map(e=>`
    <div class="timeline-item">
      <div class="tl-dot ${e.status}">${e.actor==='agent'?'◇':e.actor==='human'?'●':'⬡'}</div>
      <div class="tl-body">
        <div class="tl-meta"><span class="tl-time">${e.time}</span><span class="tl-type">${e.type}</span></div>
        <div class="tl-msg">${esc(e.msg)}</div>
      </div>
    </div>`).join('');
}

function worldHTML(){
  return `<div class="wm-grid">`+WM.map(n=>`
    <div class="wm-node risk-${n.risk}">
      <div class="wm-name">${n.name}</div>
      <div class="wm-type">${n.type} · ${n.lang}</div>
      <div class="wm-meta">Owner: ${n.owner}</div>
      <div class="wm-score ${n.score>=80?'ok':'warn'}">${n.score}/100</div>
      ${n.deps.length?`<div class="wm-deps">depends on: ${n.deps.join(', ')}</div>`:''}
    </div>`).join('')+`</div>`;
}

function verifHTML(){
  return VERIF_CHECKS.map(c=>`
    <div class="vrow">
      <div class="vrow-left">${pill(c.status)}<span style="font-size:13px;color:var(--text)">${c.name}</span></div>
      <div class="vrow-right"><span style="color:var(--muted)">${c.summary}</span><span style="color:var(--neutral);font-family:monospace">${c.dur}</span></div>
    </div>`).join('');
}

function reviewHTML(){
  return REVIEW.map(r=>`
    <div class="review-item">
      <span class="sev ${r.sev}">${r.sev}</span>
      <div style="flex:1;min-width:0">
        <span class="rev-cat">${r.cat}</span>
        <div class="rev-msg">${esc(r.msg)}</div>
      </div>
    </div>`).join('');
}

function renderContent(){
  let html='';
  switch(activeTab){
    case 'Overview':html=overview();break;
    case 'Pipeline':html=pipelineHTML();break;
    case 'Diff':html=diffHTML();break;
    case 'Trace':html=traceHTML();break;
    case 'World':html=worldHTML();break;
  }
  html+=`
    <details class="card" open style="margin-top:16px">
      <summary style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;font-weight:600">Verification Results</summary>
      <div style="margin-top:10px">${verifHTML()}</div>
    </details>
    <details class="card" style="margin-top:8px">
      <summary style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;font-weight:600">AI Review · 0 blocking · 2 findings</summary>
      <div style="margin-top:10px">${reviewHTML()}</div>
    </details>`;
  document.getElementById('content').innerHTML=html;
}

function renderAll(){
  renderTaskList();
  renderHeader();
  renderTabs();
  renderContent();
}
renderAll();
</script>
</body>
</html>
